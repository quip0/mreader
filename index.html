<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1815" />
  <title>mreader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- ===== Library dashboard ===== -->
    <section id="library" class="library">
      <header class="lib-header">
        <h1 class="lib-title">mreader</h1>
        <button id="btn-edit" class="text-btn hidden">Edit</button>
      </header>

      <div id="book-grid" class="book-grid"></div>

      <div id="lib-empty" class="lib-empty hidden">
        <div class="empty-art">📚</div>
        <p class="empty-msg">Your library is empty</p>
        <button class="open-btn" id="empty-add">Add a book</button>
        <p class="hint">EPUB &amp; PDF · or drop a file anywhere</p>
      </div>

      <button id="fab-add" class="fab" title="Add book" aria-label="Add book">+</button>
      <input type="file" id="file-input" accept=".epub,.pdf,application/epub+zip,application/pdf" multiple hidden />
    </section>

    <!-- ===== Reader ===== -->
    <section id="reader" class="reader hidden">
      <header class="toolbar">
        <button class="tb-btn" id="btn-back" title="Library" aria-label="Back to library">‹</button>
        <button class="tb-btn" id="btn-toc" title="Contents" aria-label="Contents">☰</button>
        <span class="book-title" id="book-title"></span>
        <div class="spacer"></div>
        <button class="tb-btn" id="btn-font-dec" title="Smaller text">A−</button>
        <button class="tb-btn" id="btn-font-inc" title="Larger text">A+</button>
        <button class="tb-btn" id="btn-theme" title="Theme">◐</button>
      </header>

      <div id="toc-overlay" class="toc-overlay hidden"></div>
      <aside id="toc-panel" class="toc-panel hidden">
        <div class="toc-head">Contents</div>
        <nav id="toc-list" class="toc-list"></nav>
      </aside>

      <main class="viewport" id="viewport">
        <div id="epub-area" class="epub-area hidden"></div>
        <div id="pdf-area" class="pdf-area hidden"></div>
        <!-- Transparent gesture catcher for EPUB (sits above the iframe). -->
        <div id="gesture-layer" class="gesture-layer hidden"></div>
        <div id="loading" class="loading hidden"><div class="spinner"></div></div>
      </main>
      <div id="debug-hud" class="debug-hud hidden"></div>

      <button class="nav nav-prev" id="btn-prev" title="Previous">‹</button>
      <button class="nav nav-next" id="btn-next" title="Next">›</button>

      <footer class="statusbar">
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        <span class="location" id="location"></span>
      </footer>
    </section>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
